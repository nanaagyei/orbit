
services:
  postgres:
    image: postgres:16-alpine
    container_name: orbit-postgres
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit_local_dev
      POSTGRES_DB: orbit
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orbit -d orbit']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
